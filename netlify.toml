[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.13.0"

[functions]
  directory = "netlify/functions"

# Serve live persisted feedback for agents and browsers (not the static build file).
[[redirects]]
  from = "/feedback.json"
  to = "/.netlify/functions/feedback"
  status = 200
  force = true
